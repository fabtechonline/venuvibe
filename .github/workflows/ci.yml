name: CI

# Runs static analysis and tests on every push / PR.
# Assumes this repo's root is the Flutter project (venue_vibe/). If you instead
# commit the parent folder, set `working-directory: venue_vibe` on the run steps.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Fails on analyzer ERRORS (and lets the existing very_good_analysis
      # generics-strictness warnings through). Drop the flags to enforce
      # warning-free once those are cleaned up.
      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test
